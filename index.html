<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Knitflix is an online community where knitters share their yarn stash, showcase projects, and connect with fellow fiber lovers."
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/favicon//apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon//favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/favicon//favicon-16x16.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="/js/utils/toggleHamburger.js" defer></script>
    <title>Knitflix | Authentication</title>
  </head>
  <body class="bg-brand min-h-screen grid grid-reows-[auto_1fr_auto]">
    <header class="py-4 px-2 shadow-sm">
      <nav class="container mx-auto">
        <div class="flex justify-between items-center">
          <a href="index.html" class="py-2 px-2"
            ><img
              src="images/logo/logo.png"
              alt="knitflix logo"
              class="max-w-28"
          /></a>
          <div class="hidden md:flex items-center space-x-5">
            <a
              href="index.html"
              class="py-4 px-2 text-brand-contrast border-b-4 border-brand-contrast"
              >Authentication</a
            >
            <a
              href="user/feed/index.html"
              class="py-4 px-2 text-brand-contrast hover:font-extrabold transition duration-300"
              >Feed</a
            >
            <a
              href="user/profile/index.html"
              class="py-4 px-2 text-brand-contrast hover:font-extrabold transition duration-300"
              >Profile</a
            >
          </div>

          <div class="flex md:hidden">
            <button class="" id="menu-btn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-12 h-12 text-brand-contrast"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="hidden" id="mobile-menu">
          <ul class="bg-brand-contrast py-4 px-2">
            <li>
              <a
                href="index.html"
                class="block text-sm py-4 px-2 bg-brand text-brand-contrast"
                >Authentication</a
              >
            </li>
            <li>
              <a
                href="user/feed/index.html"
                class="block text-sm py-4 px-2 text-brand"
                >Feed</a
              >
            </li>
            <li>
              <a
                href="user/profile/index.html"
                class="block text-sm py-4 px-2 text-brand"
                >Profile</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <div id="log-in-form"></div>
    </main>
    <footer>
      <div class="flex flex-col items-center py-4 px-2">
        <img
          src="/images/logo/logo-footer.png"
          alt="knitflix-logo"
          class="max-w-28 py-2 px-2"
        />
        <p class="text-brand-contrast text-base">
          Copyright Kathrine M. Evensen &copy; <span id="current-year"></span>
        </p>
      </div>
    </footer>
    <script type="module" src="js/utils/source/posts.js"></script>
    <script type="module" src="js/utils/updateYear.js"></script>
  </body>
</html>
