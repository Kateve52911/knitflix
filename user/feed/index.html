<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore the Knitflix feed to discover trending knitting projects, filter by tags, and connect with the community. Find inspiration, search for specific techniques, and share your own fiber creations."
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../../images/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../../images/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../../images/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="../../site.webmanifest" />
    <link rel="stylesheet" href="../../css/style.css" />
    <script
      src="https://kit.fontawesome.com/f6ecbff17b.js"
      crossorigin="anonymous"
    ></script>
    <script
      type="module"
      src="../../js/utils/toggleHamburger.js"
      defer
    ></script>
    <title>Feed | Knitflix</title>
  </head>
  <body class="bg-brand min-h-screen grid grid-rows-[auto_1fr_auto]">
    <header class="py-4 px-2">
      <nav class="container mx-auto">
        <div class="flex justify-between items-center">
          <a href="../index.html" class="py-2 px-2"
            ><img
              src="../../images/logo/logo.png"
              alt="knitflix logo"
              class="max-w-28 object-contain"
          /></a>
          <div class="hidden md:flex items-center space-x-5">
            <a
              href="../../index.html"
              class="py-4 px-2 font-heading text-text-dark hover:font-extrabold hover:text-accent-secondaryBtn transition duration-300"
              >Login</a
            >
            <a
              href="/user/authentication/index.html"
              class="py-4 px-2 font-heading text-text-dark hover:font-extrabold hover:text-accent-secondaryBtn transition duration-300"
              >Authentication</a
            >

            <a
              href="index.html"
              class="py-4 px-2 font-heading text-text-dark border-b-4 border-accent-accentBtn"
              >Feed</a
            >
            <a
              href="/user/profile/index.html"
              class="py-4 px-2 font-heading text-text-dark hover:font-extrabold hover:text-accent-secondaryBtn transition duration-300"
              >Profile</a
            >
          </div>

          <div class="flex md:hidden">
            <button class="" id="menu-btn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-12 h-12 text-text-dark"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="hidden" id="mobile-menu">
          <ul class="bg-brand-light py-4 px-2">
            <li>
              <a
                href="../../index.html"
                class="block text-sm py-4 px-2 font-heading text-text-medium"
                >Login</a
              >
            </li>
            <li>
              <a
                href="/user/authentication/index.html"
                class="block text-sm py-4 px-2 font-heading text-text-medium"
                >Authentication</a
              >
            </li>
            <li>
              <a
                href="index.html"
                class="block text-sm py-4 px-2 font-heading bg-accent-secondaryBtn text-text-light"
                >Feed</a
              >
            </li>
            <li>
              <a
                href="/user/profile/index.html"
                class="block text-sm py-4 px-2 font-heading text-text-medium"
                >Profile</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main class="flex flex-col py-4 px-2">
      <div class="py-4 px-2 mx-auto">
        <h1 class="text-4xl text-center font-heading text-text-dark">
          Your Knitflix feed:
        </h1>
        <p class="text-base italic text-center font-body text-text-dark">
          "Welcome to your feed — see what other knitters are working on!"
        </p>
      </div>

      <div class="container mx-auto mb-6">
        <div
          class="flex flex-col md:flex-row justify-center items-center gap-4 py-4"
        >
          <div class="filter-container">
            <label
              for="tag-filter"
              class="text-text-dark font-medium mr2 font-body"
              >Filter by:</label
            >
            <select
              name=""
              id="tag-filter"
              class="border border-gray-300 rounded-3xl py-4 px-5 bg-white text-text-dark font-body focus:outline-none focus:ring-2 focus:ring-accent-accentBtn"
            >
              <option value="all">All Posts</option>
            </select>
          </div>

          <div class="sort-container">
            <label
              for="sort-select"
              class="text-text-dark font-body font-medium mr-2"
              >Sort by:</label
            >
            <select
              name=""
              id="sort-select"
              class="border border-gray-300 rounded-3xl py-4 px-5 bg-white text-text-dark font-body focus:outline-none focus:ring-2 focus:ring-accent-accentBtn"
            >
              <option value="date">Newest First</option>
              <option value="likes">Most Liked</option>
            </select>
          </div>

          <div class="search-container">
            <label for="search-input">Search: </label>
            <input
              type="text"
              id="search-input"
              class="border border-gray-300 rounded-3xl py-3 px-4 bg-white text-text-dark font-body focus:outline-none foucs:ring-2 focus:ring-accent-accentBtn"
            />
          </div>
        </div>
      </div>

      <div class="flex justify-center mb-6">
        <button
          id="create-new-post"
          class="bg-accent-primaryBtn btn text-white font-body"
        >
          Create a new post
        </button>
      </div>

      <div
        class="sm:flex flex-col md:grid grid-cols-3 mx-auto"
        id="all-posts-container"
      ></div>

      <div id="display-container"></div>
    </main>
    <footer>
      <div class="flex flex-col items-center py-4 px-2">
        <img
          src="/images/logo/logo-footer.png"
          alt="knitflix-logo"
          class="max-w-28 py-2 px-2"
        />
        <p class="text-text-dark text-sm font-body">
          Copyright Kathrine M. Evensen &copy; <span id="current-year"></span>
        </p>
      </div>
    </footer>
    <script type="module" src="/js/utils/updateYear.js"></script>
    <script type="module" src="/js/api/posts/getPosts.js"></script>
    <script type="module" src="/js//components/modal/createModal.js"></script>
    <script type="module" src="../../js/components/renderAllPosts.js"></script>
    <script
      type="module"
      src="/js/components/filteringPosts/filterPosts.js"
    ></script>
    <script
      type="module"
      src="/js/form/createNewPost/createNewPost.js"
    ></script>
    <script type="module" src="/js/api/posts/getSingePost.js"></script>
  </body>
</html>
