<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View and manage your Knitflix profile, showcasing your knitting projects, followers, and personal details. Connect with fellow fiber enthusiasts and share your creative journey in our knitting community."
    />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../../images/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../../images/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../../images/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="../../site.webmanifest" />
    <link rel="stylesheet" href="../../css/style.css" />
    <script
      src="https://kit.fontawesome.com/f6ecbff17b.js"
      crossorigin="anonymous"
    ></script>
    <script
      type="module"
      src="../../js/utils/toggleHamburger.js"
      defer
    ></script>

    <title>Profile | Knitflix</title>
  </head>
  <body class="bg-brand min-h-screen grid grid-rows-[auto_1fr_auto]">
    <header class="py-4 px-2">
      <nav class="container mx-auto">
        <div class="flex justify-between items-center">
          <a href="../index.html" class="py-2 px-2"
            ><img
              src="../../images/logo/logo.png"
              alt="knitflix logo"
              class="max-w-28 object-contain"
          /></a>
          <div class="hidden md:flex items-center space-x-5">
            <a
              href="../index.html"
              class="py-4 px-2 font-heading text-text-dark hover:font-extrabold hover:text-accent-secondaryBtn transition duration-300"
              >Authentication</a
            >
            <a
              href="../Login/index.html"
              class="py-4 px-2 font-heading text-text-dark border-b-4 border-accent-accentBtn"
              >Login</a
            >
            <a
              href="../feed/index.html"
              class="py-4 px-2 font-heading text-text-dark hover:font-extrabold hover:text-accent-secondaryBtn transition duration-300"
              >Feed</a
            >
            <a
              href="../profile/index.html"
              class="py-4 px-2 font-heading text-text-dark border-b-4 border-accent-accentBtn"
              >Profile</a
            >
          </div>

          <div class="flex md:hidden">
            <button class="" id="menu-btn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-12 h-12 text-text-dark"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="hidden" id="mobile-menu">
          <ul class="bg-brand-light py-4 px-2">
            <li>
              <a
                href="login/index.html"
                class="block text-sm py-4 px-2 font-heading text-text-medium"
                >Login</a
              >
            </li>
            <li>
              <a
                href="../index.html"
                class="block text-sm py-4 px-2 font-heading text-text-medium"
                >Authentication</a
              >
            </li>
            <li>
              <a
                href="index.html"
                class="block text-sm py-4 px-2 font-heading bg-accent-secondaryBtn text-text-light"
                >Feed</a
              >
            </li>
            <li>
              <a
                href="../profile/index.html"
                class="block text-sm py-4 px-2 font-heading text-text-medium"
                >Profile</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main class="container mx-auto py-8 px-4">
      <div
        class="max-w-4xl mx-auto bg-accent-sageGreen rounded-lg shadow-md overflow-hidden"
      >
        <div
          class="flex flex-col md:flex-row items-center md:items-start p-6 border-b border-accent-sageGreen"
        >
          <div class="flex-shrink-0 mb-4 md:mb-0">
            <img
              src=""
              alt=""
              class="profile-avatar w-33 h-44 rounded-full object-cover border-4 border-accent'"
            />
          </div>

          <div class="flex-grow md:ml-6 text-center md:text-left">
            <h1
              class="profile-username text-2xl font-bold font-heading text-text-dark"
            ></h1>
            <h2 class="profile-name text-lg font-body text-text-dark mb-3"></h2>

            <div
              class="flex justify-center md:justify-start space-x-6 text-text-dark"
            >
              <div class="text-center">
                <span
                  class="profile-followers block font-bold font-body"
                ></span>
                <span class="text-sm font-body">Followers</span>
              </div>
              <div class="text-center">
                <span
                  class="profile-following block font-bold font-body"
                ></span>
                <span class="text-sm font-body">Following</span>
              </div>
              <div class="text-center">
                <span class="profile-posts block font-bold font-body"></span>
                <span class="text-sm font-body">Posts</span>
              </div>
            </div>
            <button
              id="follow-button"
              class="mt-4 btn font-body bg-accent-secondaryBtn text-white hover-bg-opacity-90 transition"
            >
              Follow
            </button>
            <button
              id="logout-button"
              class="mt-4 btn rounded-3xl font-body bg-accent-accentBtn text-white hover-bg-opacity-90 transition"
            >
              Logout
            </button>
          </div>
        </div>

        <div class="p-6 border-b border-accent-sageGreen">
          <h3 class="text-xl font-semibold mb-2 font-body text-text-dark">
            About Me
          </h3>
          <p class="profile-description font-body text-text-dark"></p>
        </div>

        <div class="p-6">
          <h3 class="text-xl font-body font-semibold b-4 text-text-dark">
            My Projects
          </h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6" id="user-projects">
            <div class="bg-brand-light p-4 rounded-lg">
              <p class="text-text-dark text-center font-body">
                Loading Projects...
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="flex flex-col items-center py-4 px-2">
        <img
          src="../../images/logo/logo-footer.png"
          alt="knitflix-logo"
          class="max-w-28 py-2 px-2"
        />
        <p class="text-text-dark text-base font-body">
          Copyright Kathrine M. Evensen &copy; <span id="current-year"></span>
        </p>
      </div>
    </footer>

    <script type="module" src="/js/utils/updateYear.js"></script>
    <script
      type="module"
      src="../../js/components/profilePage/profilePage.js"
    ></script>
  </body>
</html>
